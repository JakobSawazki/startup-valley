<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Startup Valley</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="src/state.js" defer></script>
    <script src="src/ui.js" defer></script>
    <script src="src/world.js" defer></script>
    <script src="src/resources.js" defer></script>
    <script src="src/main.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Browser-Aufbauspiel</p>
          <h1>Startup Valley</h1>
        </div>
        <div class="build-label" id="build-label">Version 0.0.5</div>
      </header>

      <main class="game-layout" aria-label="Startup Valley Spielfeld">
        <section class="hud" aria-labelledby="hud-title">
          <h2 id="hud-title">Inventar</h2>
          <p class="hud-intro">Aktuelle Bestände und Gebäudefortschritt.</p>
          <div class="resource-grid" id="resource-grid" role="list">
            <div class="resource-card">Geld: 0 EUR</div>
            <div class="resource-card">Holz: 0</div>
            <div class="resource-card">Stein: 0</div>
            <div class="resource-card">Metall: 0</div>
          </div>
        </section>

        <section class="world-panel" aria-labelledby="world-title">
          <div class="world-header">
            <div>
              <h2 id="world-title">Startgebiet</h2>
              <p>Ein freier Standort, erste Rohstoffe und ein kleiner Markt.</p>
            </div>
            <span class="status-pill" id="app-status">Wird geladen</span>
          </div>

          <div class="game-world" id="game-world" aria-label="Startgebiet von Startup Valley">
            <div class="world-vignette" aria-hidden="true"></div>
          </div>
        </section>

        <aside class="context-panel" aria-labelledby="context-title">
          <h2 id="context-title">Startgebiet</h2>
          <div class="context-content" id="message-line">Wähle ein Objekt im Startgebiet aus.</div>
        </aside>
      </main>
    </div>
  </body>
</html>
